<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3FE8"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- 페이지 도형 -->
  <rect x="30" y="28" width="52" height="64" rx="6" fill="white" opacity="0.15"/>
  <rect x="34" y="32" width="52" height="64" rx="6" fill="white" opacity="0.2"/>
  <rect x="38" y="36" width="52" height="64" rx="6" fill="url(#shine)"/>

  <!-- 텍스트 라인 (심플) -->
  <rect x="46" y="52" width="36" height="4" rx="2" fill="#6C3FE8" opacity="0.5"/>
  <rect x="46" y="62" width="28" height="4" rx="2" fill="#6C3FE8" opacity="0.4"/>
  <rect x="46" y="72" width="32" height="4" rx="2" fill="#6C3FE8" opacity="0.4"/>

  <!-- 스파클 점 3개 -->
  <circle cx="96" cy="36" r="5" fill="white" opacity="0.9"/>
  <circle cx="96" cy="36" r="2.5" fill="#A78BFA"/>
  <circle cx="104" cy="26" r="3" fill="white" opacity="0.6"/>
  <circle cx="88" cy="28" r="2" fill="white" opacity="0.5"/>
</svg>
